name: TeleportPlugin
version: '${project.version}'
main: dev.tpplugin.TeleportPlugin
api-version: '1.21'
description: Custom teleport commands with permissions
authors: [ ]

commands:
  tpl:
    description: "Телепортация себя по координатам (/tpl <x> <y> <z>)"
    usage: "/tpl <x> <y> <z>"
    aliases: [tplocation]
    permission: tpplugin.tp.coords
    permission-message: "&cУ вас нет прав для использования этой команды!"
  tpp:
    description: "Телепортация себя к указанному игроку (/tpp <игрок>)"
    usage: "/tpp <игрок>"
    aliases: [tpplayer]
    permission: tpplugin.tp.player
    permission-message: "&cУ вас нет прав для использования этой команды!"
  tpy:
    description: "Притянуть указанного игрока к себе (/tpy <игрок>)"
    usage: "/tpy <игрок>"
    aliases: [tpyank]
    permission: tpplugin.tp.pull
    permission-message: "&cУ вас нет прав для использования этой команды!"
  tpe:
    description: "Телепортировать первого игрока ко второму (/tpe <игрок1> <игрок2>)"
    usage: "/tpe <игрок1> <игрок2>"
    aliases: [tpeach]
    permission: tpplugin.tp.force
    permission-message: "&cУ вас нет прав для использования этой команды!"
  tph:
    description: "Справка по командам телепортации для игрока"
    usage: "/tph"
    aliases: [tphelp]
    permission: tpplugin.tp.help
    permission-message: "&cУ вас нет прав для просмотра справки!"
  tpha:
    description: "Административная справка: все команды и пермишены"
    usage: "/tpha"
    aliases: [tphelpadmin]
    permission: tpplugin.tp.help.admin
    permission-message: "&cУ вас нет прав для просмотра административной справки!"

permissions:
  tpplugin.tp.coords:
    description: "/tpl <x> <y> <z> — телепортация себя по координатам"
    default: op
  tpplugin.tp.player:
    description: "/tpp <игрок> — телепортация себя к игроку"
    default: op
  tpplugin.tp.pull:
    description: "/tpy <игрок> — притянуть игрока к себе"
    default: op
  tpplugin.tp.force:
    description: "/tpe <игрок1> <игрок2> — телепортация чужого игрока к другому"
    default: op
  tpplugin.tp.help:
    description: "/tph — просмотр справки по командам для игрока"
    default: op
  tpplugin.tp.help.admin:
    description: "/tpha — просмотр полной административной справки с пермишенами"
    default: op
  tpplugin.tp.*:
    description: "Все права на телепортацию (включает все пермишены плагина)"
    default: op
    children:
      tpplugin.tp.coords: true
      tpplugin.tp.player: true
      tpplugin.tp.pull: true
      tpplugin.tp.force: true
      tpplugin.tp.help: true
      tpplugin.tp.help.admin: true
